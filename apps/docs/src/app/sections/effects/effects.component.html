<docs-section-header title="Effects" description="Shadow tokens defining elevation levels across the design system." />

<div class="effects-content">
  <div class="table-header">
    <span class="col-name label-m-medium">Name</span>
    <span class="col-value label-m-medium">Value</span>
    <span class="col-preview label-m-medium">Preview</span>
  </div>
  <div class="divider"></div>
  @for (s of shadows; track s.token) {
    <div class="shadow-row">
      <span class="col-name label-m-medium mono">{{ s.token }}</span>
      <span class="col-value body-m-regular mono">{{ s.value }}</span>
      <div class="col-preview">
        <div class="preview-box" [style.box-shadow]="'var(' + s.token + ')'"></div>
      </div>
    </div>
  }
</div>
