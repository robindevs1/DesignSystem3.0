<docs-section-header title="Spacing" description="Spacing scale tokens for margin, padding, and gap values." />

<div class="spacing-content">
  <div class="table-header">
    <span class="col-name">Name</span>
    <span class="col-value">Value</span>
    <span class="col-bar">Spacing</span>
  </div>
  <div class="divider"></div>
  @for (t of tokens; track t.token) {
    <div class="spacing-row">
      <span class="col-name">{{ t.token }}</span>
      <span class="col-value">{{ t.value }}px</span>
      <div class="col-bar">
        <div class="bar" [style.width.px]="t.barWidth"></div>
      </div>
    </div>
  }
</div>
