<docs-section-header title="Input Fields" description="Text input variants and states for form elements." />

<div class="inputs-content">
  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">Default</span>
      <span class="input-desc body-s-regular">Standard text input</span>
    </div>
    <div class="input-preview">
      <input class="input" type="text" placeholder="Placeholder text" />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">With Label</span>
      <span class="input-desc body-s-regular">Input with a label above</span>
    </div>
    <div class="input-preview">
      <label class="field-label label-s-medium" for="email-input">Email address</label>
      <input id="email-input" class="input body-l-regular" type="email" placeholder="name@company.com" />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">Error State</span>
      <span class="input-desc body-s-regular">Input with validation error</span>
    </div>
    <div class="input-preview">
      <input class="input body-l-regular input--error" type="text" value="invalid@" />
      <span class="input-hint body-s-regular input-hint--error">Please enter a valid email address.</span>
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">Success State</span>
      <span class="input-desc body-s-regular">Input with valid feedback</span>
    </div>
    <div class="input-preview">
      <input class="input body-l-regular input--success" type="text" value="valid@email.com" />
      <span class="input-hint body-s-regular input-hint--success">Email address is valid.</span>
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">Disabled</span>
      <span class="input-desc body-s-regular">Non-interactive state</span>
    </div>
    <div class="input-preview">
      <input class="input body-l-regular input--disabled" type="text" placeholder="Disabled input" disabled />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label label-m-medium">Textarea</span>
      <span class="input-desc body-s-regular">Multi-line text input</span>
    </div>
    <div class="input-preview">
      <textarea class="input body-l-regular input--textarea" rows="3" placeholder="Enter a longer message..."></textarea>
    </div>
  </div>
</div>
