<docs-section-header title="Input Fields" description="Text input variants and states for form elements." />

<div class="inputs-content">
  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">Default</span>
      <span class="input-desc">Standard text input</span>
    </div>
    <div class="input-preview">
      <input class="input" type="text" placeholder="Placeholder text" />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">With Label</span>
      <span class="input-desc">Input with a label above</span>
    </div>
    <div class="input-preview">
      <label class="field-label">Email address</label>
      <input class="input" type="email" placeholder="name@company.com" />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">Error State</span>
      <span class="input-desc">Input with validation error</span>
    </div>
    <div class="input-preview">
      <input class="input input--error" type="text" value="invalid@" />
      <span class="input-hint input-hint--error">Please enter a valid email address.</span>
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">Success State</span>
      <span class="input-desc">Input with valid feedback</span>
    </div>
    <div class="input-preview">
      <input class="input input--success" type="text" value="valid@email.com" />
      <span class="input-hint input-hint--success">Email address is valid.</span>
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">Disabled</span>
      <span class="input-desc">Non-interactive state</span>
    </div>
    <div class="input-preview">
      <input class="input input--disabled" type="text" placeholder="Disabled input" disabled />
    </div>
  </div>

  <div class="input-row">
    <div class="input-meta">
      <span class="input-label">Textarea</span>
      <span class="input-desc">Multi-line text input</span>
    </div>
    <div class="input-preview">
      <textarea class="input input--textarea" rows="3" placeholder="Enter a longer message..."></textarea>
    </div>
  </div>
</div>
