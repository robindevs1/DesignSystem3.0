<docs-section-header title="Icons" description="Coleman icon set sourced from Material Symbols — outlined and filled variants." />

<div class="icons-content">
  <!-- ── Playground ───────────────────────────── -->
  <div class="playground">
    <div class="playground-controls">
      <label class="control">
        <span class="control-label label-s-medium">Icon</span>
        <select class="control-select body-m-regular" [ngModel]="playgroundIcon().name" (ngModelChange)="selectPlaygroundIcon($event)">
          @for (icon of icons; track icon.name) {
            <option [value]="icon.name">{{ icon.name }}</option>
          }
        </select>
      </label>

      <label class="control">
        <span class="control-label label-s-medium">Size</span>
        <select
          class="control-select body-m-regular mono"
          [ngModel]="playgroundSize().token"
          (ngModelChange)="selectPlaygroundSize($event)"
        >
          @for (size of sizes; track size.token) {
            <option [value]="size.token">.{{ size.token }} — {{ size.px }}px</option>
          }
        </select>
      </label>
    </div>

    <div class="playground-stage">
      <img
        [src]="'assets/icons/' + outlinedFile(playgroundIcon())"
        [alt]="playgroundIcon().name"
        [width]="playgroundSize().px"
        [height]="playgroundSize().px"
      />
    </div>
  </div>

  <!-- ── Grid ─────────────────────────────────── -->
  <div class="icon-grid">
    @for (icon of icons; track icon.name) {
      <div class="icon-card">
        <span class="icon-name label-m-medium">{{ icon.name }}</span>

        <div class="icon-preview">
          <div class="icon-preview-item">
            <img [src]="'assets/icons/' + outlinedFile(icon)" [alt]="icon.name + ' outlined'" width="32" height="32" />
            <span class="preview-label body-s-regular">Outlined</span>
          </div>
          @if (icon.hasFillVariant) {
            <div class="icon-preview-item">
              <img [src]="'assets/icons/' + filledFile(icon)" [alt]="icon.name + ' filled'" width="32" height="32" />
              <span class="preview-label body-s-regular">Filled</span>
            </div>
          }
        </div>

        <div class="icon-files">
          <code>{{ outlinedFile(icon) }}</code>
          @if (icon.hasFillVariant) {
            <code>{{ filledFile(icon) }}</code>
          }
        </div>
      </div>
    }
  </div>
</div>
